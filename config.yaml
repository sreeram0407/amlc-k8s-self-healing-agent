agent:
  # Triage model — used for the initial investigation phase (cheap, fast).
  model: claude-haiku-4-5-20251001
  # Incident model — used once a remediation or escalation is being proposed.
  incident_model: claude-sonnet-4-6
  max_tokens: 2048

guardrails:
  max_restarts_per_hour: 3
  max_replicas: 10
  rollback_window_minutes: 60
  max_memory_multiplier: 2.0
  cooldown_seconds: 60
  blast_radius_threshold: 0.5
  max_actions_per_hour: 10

openclaw:
  channel: "#oncall-sre"
  enabled: false
  webhook_url: ""
  agent_id: "default"
  hooks_token_env: "OPENCLAW_HOOKS_TOKEN"
  deliver: false
  paging_enabled: false
  timeout_seconds: 10
