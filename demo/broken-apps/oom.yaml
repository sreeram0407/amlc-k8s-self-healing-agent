apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  namespace: default
  labels:
    app: oom-demo
    demo: broken
    scenario: oomkilled
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo
  template:
    metadata:
      labels:
        app: oom-demo
        demo: broken
        scenario: oomkilled
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: stress
        image: polinux/stress:latest
        imagePullPolicy: IfNotPresent
        command: ["stress"]
        args: ["--vm", "1", "--vm-bytes", "250M", "--vm-hang", "1"]
        resources:
          requests:
            memory: "8Mi"
            cpu: "50m"
          limits:
            memory: "10Mi"
            cpu: "100m"
